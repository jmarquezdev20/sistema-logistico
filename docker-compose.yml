version: '3.9'

services:
  db:
    image: postgres:16
    container_name: logistico_db
    environment:
      POSTGRES_DB: logistico_db
      POSTGRES_USER: logistico_user
      POSTGRES_PASSWORD: logistico_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistico_user -d logistico_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
  build:
    context: .
    dockerfile: Dockerfile.backend
  container_name: logistico_backend
  command: python manage.py runserver 0.0.0.0:8000
  volumes:
    - .:/app
  ports:
    - "8000:8000"
  environment:
    - DB_NAME=logistico_db
    - DB_USER=postgres
    - DB_PASSWORD=12345
    - DB_HOST=db
    - DB_PORT=5432
    - SECRET_KEY=django-insecure-change-this-in-production
    - DEBUG=True
  depends_on:
    db:
      condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: logistico_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
